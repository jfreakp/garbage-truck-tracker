services:
  db:
    image: postgis/postgis:16-3.4
    container_name: garbage_tracker_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: garbage_tracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d garbage_tracker"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
